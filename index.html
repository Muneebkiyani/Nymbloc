    <link rel="preload" as="image" href="/assets/hero-poster.png" fetchpriority="high">

    <!-- Google Consent Mode v2 defaults: deny ads/analytics until the user chooses (EU/UK + AdSense-ready) -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      window.gtag = gtag;
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied',
        functionality_storage: 'granted',
        personalization_storage: 'denied',
        security_storage: 'granted',
        wait_for_update: 500,
      });
    </script>
